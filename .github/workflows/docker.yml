name: this is my workflow to login and deploy on the docker hub
on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string
        default: latest
        description: write the image tag to push
      file-docker:
        required: true
        type: string
        default: ./Dockerfile
        description: where is your docker file
       
      push-image:
        required: true
        type: boolean
        default: false
        description: want to push or not 

      docker-hub-repo:
        required: true
        type: string
        description: whiche docker hub repo to want push


    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
jobs:
  deploy-docker:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx 
        uses: docker/setup-buildx-action@v3

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: docker image build and push 
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ${{ inputs.file-docker }}
          push: ${{ inputs.push-image }}
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.docker-hub-repo }}:${{ inputs.image-tag }}


        